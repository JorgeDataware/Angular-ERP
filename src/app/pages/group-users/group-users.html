<p-toast />
<p-confirmdialog />

<div class="group-users-container">
  <div class="group-users-header">
    <p-button
      icon="pi pi-arrow-left"
      severity="secondary"
      [text]="true"
      [rounded]="true"
      pTooltip="Volver a Grupos"
      tooltipPosition="right"
      (onClick)="goBack()"
    />
    <h1 class="group-users-title">
      @if (groupName()) {
        Miembros - {{ groupName() }}
      } @else {
        Miembros del Grupo
      }
    </h1>
  </div>

  <!-- Toolbar -->
  <p-toolbar styleClass="group-users-toolbar">
    <ng-template #start>
      <ng-container *appHasPermission="['groups', 'edit']">
        <p-button
          label="Agregar Miembro"
          icon="pi pi-user-plus"
          severity="primary"
          (onClick)="openAddMember()"
        />
      </ng-container>
    </ng-template>
    <ng-template #end>
      <p-iconfield>
        <p-inputicon styleClass="pi pi-search" />
        <input
          pInputText
          [ngModel]="searchValue()"
          (ngModelChange)="searchValue.set($event)"
          placeholder="Buscar miembros..."
        />
      </p-iconfield>
    </ng-template>
  </p-toolbar>

  <!-- DataTable — Members -->
  <p-table
    [value]="filteredMembers()"
    [paginator]="true"
    [rows]="10"
    [rowsPerPageOptions]="[5, 10, 25]"
    [tableStyle]="{ 'min-width': '40rem' }"
    [rowHover]="true"
    [showCurrentPageReport]="true"
    currentPageReportTemplate="Mostrando {first} a {last} de {totalRecords} miembros"
    [loading]="loading()"
    dataKey="id"
    styleClass="p-datatable-striped"
  >
    <ng-template #header>
      <tr>
        <th pSortableColumn="userName" style="min-width: 10rem">
          Usuario <p-sortIcon field="userName" />
        </th>
        <th pSortableColumn="completeName" style="min-width: 14rem">
          Nombre completo <p-sortIcon field="completeName" />
        </th>
        <th style="min-width: 8rem; text-align: center">Acciones</th>
      </tr>
    </ng-template>

    <ng-template #body let-member>
      <tr>
        <td>
          <span class="username-cell">{{ member.userName }}</span>
        </td>
        <td>{{ member.completeName }}</td>
        <td class="actions-cell">
          <ng-container *appHasPermission="['groups', 'edit']">
            <p-button
              icon="pi pi-user-minus"
              [rounded]="true"
              severity="danger"
              [text]="true"
              pTooltip="Remover del grupo"
              tooltipPosition="top"
              (onClick)="confirmRemoveMember(member)"
            />
          </ng-container>
        </td>
      </tr>
    </ng-template>

    <ng-template #emptymessage>
      <tr>
        <td colspan="3" class="empty-message">
          <i class="pi pi-users empty-icon"></i>
          <span>No hay miembros en este grupo</span>
        </td>
      </tr>
    </ng-template>
  </p-table>
</div>

<!-- Add Member Dialog -->
<p-dialog
  header="Agregar Miembro"
  [(visible)]="addMemberDialogVisible"
  [modal]="true"
  [style]="{ width: '35rem', 'min-height': '20rem' }"
  [draggable]="false"
  [resizable]="false"
  (onHide)="hideAddMemberDialog()"
  styleClass="group-users-dialog"
>
  <div class="dialog-content">
    <div class="field">
      <label for="memberSelect">Seleccionar usuario <span class="required">*</span></label>
      <p-select
        id="memberSelect"
        [options]="availableUsers()"
        [ngModel]="selectedUserId()"
        (ngModelChange)="selectedUserId.set($event)"
        optionLabel="label"
        optionValue="value"
        placeholder="Selecciona un usuario"
        [filter]="true"
        filterPlaceholder="Buscar usuario..."
        [disabled]="addingMember()"
        styleClass="w-full"
        appendTo="body"
      />
    </div>
  </div>

  <ng-template #footer>
    <p-button
      label="Cancelar"
      icon="pi pi-times"
      severity="secondary"
      [text]="true"
      [disabled]="addingMember()"
      (onClick)="hideAddMemberDialog()"
    />
    <p-button
      label="Agregar"
      icon="pi pi-check"
      [loading]="addingMember()"
      [disabled]="!selectedUserId()"
      (onClick)="addMember()"
    />
  </ng-template>
</p-dialog>
